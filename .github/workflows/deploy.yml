name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: RaspberrryProd
    steps:
      - name: Validate secrets
        run: |
          MISSING=()
          [ -z "${{ secrets.SSH_KEY }}"      ] && MISSING+=("SSH_KEY")
          [ -z "${{ secrets.SSH_HOST }}"     ] && MISSING+=("SSH_HOST")
          [ -z "${{ secrets.SSH_USERNAME }}" ] && MISSING+=("SSH_USERNAME")
          [ -z "${{ secrets.DEPLOY_PATH }}"  ] && MISSING+=("DEPLOY_PATH")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Deployment aborted — the following secrets are not set in the RaspberrryProd environment:"
            for s in "${MISSING[@]}"; do echo "   • $s"; done
            exit 1
          fi
          echo "✅ All required secrets are present."

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Configure SSH for Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          echo "Host ${{ secrets.SSH_HOST }}
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null" >> ~/.ssh/config

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << 'EOF'
            export PATH=$PATH:/usr/local/go/bin
            cd ${{ secrets.DEPLOY_PATH }}
            git pull
            bash scripts/deploy-service.sh
          EOF
